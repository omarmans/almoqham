<section class="attorney-profile" [attr.lang]="currentLang()">
  <div class="profile-container">
    <div class="profile-image">
      <!-- <img src="imgs/client.webp" alt="المحامي" /> -->
      <img src="imgs/cor/MainPhoto.webp" alt="" />

      <div class="image-overlay"></div>
    </div>

    <div class="profile-content">
      <h2
        class="attorney-name"
        [ngClass]="
          currentLang() === 'ar' ? 'tajawalExtraBold' : 'montserratBold'
        "
      >
        @if (currentLang()==='ar') {
        {{ attorneyData.name.ar }}
        } @else {
        {{ attorneyData.name.en }}
        }
      </h2>

      <p
        class="attorney-title"
        [ngClass]="currentLang() === 'ar' ? 'cairoSemibold' : 'poppinsSemibold'"
      >
        @if (currentLang() === 'ar') {
        {{ attorneyData.title.ar }}
        } @else {
        {{ attorneyData.title.en }}
        }
      </p>

      <div class="divider"></div>

      <p
        class="attorney-bio"
        [ngClass]="currentLang() === 'ar' ? 'cairoRegular' : 'poppinsRegular'"
      >
        @if (currentLang() === 'ar') {
        {{ attorneyData.bio.ar }}
        } @else {
        {{ attorneyData.bio.en }}
        }
      </p>

      <div class="social-links">
        <a href="#" class="social-link" aria-label="Facebook">
          <i class="fab fa-facebook-f"></i>
        </a>
        <a href="#" class="social-link" aria-label="Twitter">
          <i class="fab fa-twitter"></i>
        </a>
        <a href="#" class="social-link" aria-label="LinkedIn">
          <i class="fab fa-linkedin-in"></i>
        </a>
        <a href="#" class="social-link" aria-label="Instagram">
          <i class="fab fa-instagram"></i>
        </a>
      </div>
    </div>
  </div>
</section>
